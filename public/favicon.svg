<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Luxurious premium dark background -->
  <rect width="100" height="100" rx="24" fill="#1A1A1A" />
  <!-- Central brand monogram combining letter R and a beautiful cosmic makeup leaf accent -->
  <g transform="translate(10, 10)">
    <!-- Riya main stem -->
    <path d="M30 15 L30 65" stroke="#FFFFFF" stroke-width="6" stroke-linecap="round" />
    <!-- Cosmetic pink loop forming the upper R -->
    <path d="M30 15 C 45 15, 62 20, 62 38 C 62 55, 45 53, 30 53" fill="none" stroke="#FF0052" stroke-width="6.5" stroke-linecap="round" stroke-linejoin="round" />
    <!-- Stylized leg stroke -->
    <path d="M42 48 C 45 48, 62 50, 65 65" fill="none" stroke="#FF0052" stroke-width="6.5" stroke-linecap="round" />
    <!-- Elegant brand sparkle indicators -->
    <circle cx="62" cy="18" r="4" fill="#FF0052" />
    <circle cx="20" cy="30" r="3" fill="#E6E1D6" />
  </g>
</svg>
